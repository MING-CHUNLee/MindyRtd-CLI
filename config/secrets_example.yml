# ============================================================
# Secrets Example — copy values to a root-level .env file
# (config/secrets.yml is gitignored; use .env for simplicity)
# ============================================================

# Google Gemini
GEMINI_API_KEY: your-google-gemini-api-key-here

# Model config (optional — defaults shown)
LLM_MODEL: gemini-2.5-flash
LLM_MAX_TOKENS: "8192"
LLM_TIMEOUT: "90"        # seconds

# Ruby API server
API_HOST: localhost
API_PORT: "9090"
